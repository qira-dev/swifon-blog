kind = "web"
previewPath = "/"
title = "QiraHub"
version = "1.0.0"
id = "artifacts/qirahub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23215

[services.development]
run = "pnpm --filter @workspace/qirahub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qirahub", "run", "build" ]
publicDir = "artifacts/qirahub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23215"
BASE_PATH = "/"
